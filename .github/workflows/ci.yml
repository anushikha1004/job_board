name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build (webpack)
        run: npm run build -- --webpack

      - name: Install E2E test dependencies
        run: npm install --no-save @playwright/test

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: E2E smoke tests
        run: npm run test:e2e

      - name: Install rules-test dependencies
        run: npm install --no-save @firebase/rules-unit-testing firebase-tools

      - name: Firestore rules tests
        run: npx firebase-tools emulators:exec --project techhire-ci --only firestore "npm run test:rules"
